<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Study Hub</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="logo">AI Study Hub</h2>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="login.html" class="nav-link active">Login</a>
                <a href="register.html" class="nav-link">Register</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
            </nav>
        </aside>

        <main class="main-content">
            <section class="page-header">
                <h1>Login</h1>
                <p>Only verified accounts can log in to the system.</p>
            </section>

            <section class="card form-card">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input id="loginEmail" name="email" type="email" placeholder="user@test.com" required />
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input id="loginPassword" name="password" type="password" placeholder="Enter your password"
                            required />
                    </div>

                    <button type="submit" class="btn btn-primary">Login</button>

                    <p class="helper-text">
                        New user? <a href="register.html">Create an account</a>
                    </p>

                    <p id="loginMessage" class="helper-text"></p>
                </form>
            </section>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
